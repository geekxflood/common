---
name: Golangci

on:
  push:
    branches: ["main"]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
  schedule:
    - cron: "20 9 * * 0"

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: Download dependencies
        run: go mod download
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8.0.0
        with:
          args: --config=.golangci.yml --modules-download-mode=mod --output.sarif.path=golangci-report.sarif
      - name: Upload golangci-lint SARIF to code scanning
        if: ${{ github.event_name == 'push' || github.event_name == 'schedule' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: golangci-report.sarif
      - name: Upload golangci-lint report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: golangci-lint-report
          path: golangci-report.sarif
